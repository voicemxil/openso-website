<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Confirm your account — OpenSO</title>
<link rel="icon" href="assets/favicon-32.png?v=2" type="image/png">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<nav class="nav">
  <a class="brand" href="index.html">
    <img src="assets/icon.svg" alt="OpenSO logo">
    <span class="wm">Open<span class="so">SO</span></span>
  </a>
</nav>

<main class="auth-wrap">
  <div class="auth-card">
    <h1>Finish your account</h1>
    <p class="sub">Set your username and password to complete registration.</p>

    <div class="msg" id="msg"></div>

    <form id="confirm-form" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required>
        <div class="hint">The address this confirmation link was sent to.</div>
      </div>
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required>
        <div class="hint">3–24 characters.</div>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="new-password" required>
      </div>
      <!-- Registration key: shown only on invite-only servers (discovered via /userapi/registration/info).
           This is where the email-verification flow collects the key, submitted with the /confirm step. -->
      <div class="field" id="key-field" hidden>
        <label for="key">Registration key</label>
        <input type="text" id="key" name="key" autocomplete="off">
        <div class="hint">This server is invite-only. Enter the key you were given.</div>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submit">Confirm &amp; create</button>
    </form>
  </div>
</main>

<footer class="footer">
  <div class="credit">Built on FreeSO · free · open source · never pay-to-win.</div>
</footer>

<script src="assets/openso.js"></script>
<script>
const token = opensoQuery("token");
const form = document.getElementById("confirm-form");
const msg  = document.getElementById("msg");
const btn  = document.getElementById("submit");

// The confirm endpoint requires the email the code was issued for (bound server-side against the
// token — anti account-takeover). Newer verification links carry it as ?email=...; prefill from
// there, but keep the field editable so links sent before the change (or with stripped params)
// still work by typing it manually.
const emailFromLink = opensoQuery("email");
if (emailFromLink) document.getElementById("email").value = emailFromLink;

if (!token) {
  opensoMsg(msg, "error", "This confirmation link is missing its token. Please use the link from your email.");
  form.style.display = "none";
}

// Reveal the key field only on invite-only servers. Fails OPEN to false, so public servers (and an
// unreachable/absent discovery endpoint) show no key field and post an identical body to before.
let keyRequired = false;
(async () => {
  const info = await opensoRegInfo();
  keyRequired = info.key_required;
  if (keyRequired) document.getElementById("key-field").hidden = false;
})();

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  opensoClear(msg);
  const email    = document.getElementById("email").value.trim();
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  const key      = document.getElementById("key").value.trim();
  if (!email || !username || !password) { opensoMsg(msg,"error","Please fill in all the fields."); return; }
  if (keyRequired && !key) { opensoMsg(msg,"error","This server is invite-only — please enter your registration key."); return; }

  btn.disabled = true; btn.textContent = "Confirming…";
  // Only include the key when we have one, so the public flow posts an identical body to before.
  const fields = key ? { username, password, token, email, key } : { username, password, token, email };
  const r = await opensoPost("/userapi/registration/confirm", fields);
  if (r.ok) {
    form.style.display = "none";
    opensoMsg(msg, "ok", "Your account is ready! Download the game and sign in to start playing.");
  } else {
    opensoMsg(msg, "error", r.message);
  }
  btn.disabled = false; btn.textContent = "Confirm & create";
});
</script>
</body>
</html>
